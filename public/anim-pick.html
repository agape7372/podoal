<style>
 *{box-sizing:border-box} html,body{margin:0}
 body{background:radial-gradient(120% 80% at 50% -8%,#F0E7FB 0,#F3ECFA 58%,#EEE9F6 100%);color:#2F2A3F;font-family:'Noto Sans KR',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:24px 16px 70px;word-break:keep-all}

 .card{position:relative;background:#FCF9FF;border-radius:26px;padding:22px 18px 20px;overflow:visible;box-shadow:0 14px 30px rgba(73,50,100,.10),0 2px 6px rgba(73,50,100,.05);display:flex;flex-direction:column;align-items:center;text-align:center}

 .grape{position:relative;width:76px;height:76px;border-radius:50%;border:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;display:block;
  background:linear-gradient(145deg,#d4b8f0,#b794d6);
  box-shadow:inset 0 2px 4px rgba(255,255,255,.45),inset 0 -3px 6px rgba(94,63,128,.22),0 2px 8px rgba(155,112,200,.28);}

/* g40 히트스톱 임팩트 프리즈 */
.g40 .grape{will-change:transform}.g40 .g40-flash{position:absolute;inset:-2px;border-radius:50%;pointer-events:none;z-index:2;opacity:0;background:radial-gradient(circle,rgba(255,255,255,0) 56%,rgba(255,255,255,.7) 70%,rgba(255,255,255,0) 84%)}@keyframes g40-idle{0%,100%{transform:translateZ(0) scale(1)}46%{transform:translateZ(0) scale(1.018)}54%{transform:translateZ(0) scale(1.015)}}.g40 .grape{animation:g40-idle 3.6s ease-in-out infinite}.g40 .grape.play{animation:g40-hit 1.2s cubic-bezier(.3,1,.4,1)}@keyframes g40-hit{0%{transform:translateZ(0) scale(1,1)}10%{transform:translateZ(0) scale(1.12,.84)}16%{transform:translateZ(0) scale(1.14,.82)}30%{transform:translateZ(0) scale(1.14,.82)}31%{transform:translateZ(0) scale(.93,1.1)}48%{transform:translateZ(0) scale(1.04,.98)}66%{transform:translateZ(0) scale(.99,1.01)}82%{transform:translateZ(0) scale(1.006,.997)}100%{transform:translateZ(0) scale(1,1)}}.g40 .grape.play .g40-flash{animation:g40-flash 1.2s linear both}@keyframes g40-flash{0%{opacity:0}13%{opacity:0}16%{opacity:1}30%{opacity:.85}33%{opacity:0}100%{opacity:0}}@media (prefers-reduced-motion:reduce){.g40 .grape,.g40 .grape.play,.g40 .g40-flash,.g40 .grape.play .g40-flash{animation:none}}

/* g49 블롭 보더라디우스 모프 */
.g49 .grape{will-change:transform,border-radius}.g49 .g49-clip{position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0}.g49 .g49-gloss{position:absolute;inset:7px;border-radius:inherit;pointer-events:none;z-index:2;mix-blend-mode:soft-light;background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.55) 0,rgba(255,255,255,0) 46%)}@keyframes g49-idle{0%,100%{border-radius:50%;transform:translateZ(0) rotate(0deg) scale(1)}30%{border-radius:58% 42% 55% 45%/48% 52% 48% 52%;transform:translateZ(0) rotate(-2deg) scale(1.012)}62%{border-radius:44% 56% 47% 53%/55% 45% 55% 45%;transform:translateZ(0) rotate(2deg) scale(1.006)}}.g49 .grape{animation:g49-idle 7.5s ease-in-out infinite}@keyframes g49-gloss{0%,100%{border-radius:50%}30%{border-radius:58% 42% 55% 45%/48% 52% 48% 52%}62%{border-radius:44% 56% 47% 53%/55% 45% 55% 45%}}.g49 .g49-gloss{animation:g49-gloss 7.5s ease-in-out infinite}.g49 .grape.play{animation:g49-press 1.2s cubic-bezier(.34,1.2,.5,1)}@keyframes g49-press{0%{border-radius:50%;transform:translateZ(0) scale(1,1)}16%{border-radius:66% 34% 38% 62%/62% 64% 36% 38%;transform:translateZ(0) scale(1.07,.93)}38%{border-radius:38% 62% 64% 36%/40% 38% 62% 60%;transform:translateZ(0) scale(.95,1.06)}60%{border-radius:56% 44% 46% 54%/52% 54% 46% 48%;transform:translateZ(0) scale(1.03,.98)}80%{border-radius:48% 52% 53% 47%/50% 48% 52% 50%;transform:translateZ(0) scale(.99,1.01)}100%{border-radius:50%;transform:translateZ(0) scale(1,1)}}.g49 .grape.play .g49-gloss{animation:g49-pressR 1.2s cubic-bezier(.34,1.2,.5,1)}@keyframes g49-pressR{0%{border-radius:50%}16%{border-radius:66% 34% 38% 62%/62% 64% 36% 38%}38%{border-radius:38% 62% 64% 36%/40% 38% 62% 60%}60%{border-radius:56% 44% 46% 54%/52% 54% 46% 48%}80%{border-radius:48% 52% 53% 47%/50% 48% 52% 50%}100%{border-radius:50%}}@media (prefers-reduced-motion:reduce){.g49 .grape,.g49 .grape.play,.g49 .g49-gloss,.g49 .grape.play .g49-gloss{animation:none;border-radius:50%}}

/* g17 점토 눌림 — 깊이 프레스인 */
.g17 .grape{transition:none;animation:g17-idle 2600ms ease-in-out infinite;}
.g17 .grape::after{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;box-shadow:inset 0 5px 9px rgba(94,63,128,0.30),inset 0 -3px 6px rgba(255,255,255,0.30);opacity:0;transition:none;}
.g17 .grape.play{animation:g17-press 1100ms cubic-bezier(0.34,1.56,0.64,1) 1;}
.g17 .grape.play::after{animation:g17-deepen 1100ms ease-out 1;}
@keyframes g17-idle{0%,100%{transform:translateZ(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}48%{transform:translateZ(0) scale(0.975);box-shadow:0 4px 10px rgba(73,50,100,0.18),inset 0 -2px 5px rgba(94,63,128,0.34),inset 0 3px 6px rgba(255,255,255,0.34);}}
@keyframes g17-press{0%{transform:translateZ(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}16%{transform:translateZ(0) scale(0.9,0.82);box-shadow:0 2px 6px rgba(73,50,100,0.14),inset 0 7px 12px rgba(94,63,128,0.40),inset 0 -2px 5px rgba(255,255,255,0.30);}34%{transform:translateZ(0) scale(0.86,0.9);box-shadow:0 2px 5px rgba(73,50,100,0.14),inset 0 8px 13px rgba(94,63,128,0.42),inset 0 -2px 5px rgba(255,255,255,0.28);}62%{transform:translateZ(0) scale(1.06,1.02);box-shadow:0 10px 20px rgba(73,50,100,0.22),inset 0 -4px 7px rgba(94,63,128,0.26),inset 0 4px 7px rgba(255,255,255,0.42);}100%{transform:translateZ(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}}
@keyframes g17-deepen{0%{opacity:0;}18%{opacity:1;}55%{opacity:0.5;}100%{opacity:0;}}
@media (prefers-reduced-motion: reduce){.g17 .grape,.g17 .grape.play,.g17 .grape::after,.g17 .grape.play::after{animation:none;}.g17 .grape.play{box-shadow:0 4px 10px rgba(73,50,100,0.18),inset 0 6px 11px rgba(94,63,128,0.38),inset 0 -2px 5px rgba(255,255,255,0.30);}}

</style></head><body>
 <header>
  <h1>최종 후보 3안 · 40 · 49 · 17</h1>
  <p class="lead">기본은 <b>자동 반복</b>으로 ‘눌렀을 때’가 계속 재생됩니다. 카드를 탭하면 즉시 한 번 더 재생돼요. 마음에 드는 번호 하나(또는 전·후 조합)를 알려주시면 실제 앱에 적용합니다.</p>
  <div class="toolbar"><button class="btn" id="toggle">자동 반복: 켜짐</button><button class="btn ghost" id="once">전체 한 번 재생</button></div>
 </header>
 <main class="grid">
    <figure class="card g40">
      <span class="num">40</span>
      <div class="stage"><span class="zoom"><button class="grape" aria-label="히트스톱 임팩트 프리즈"><span class="g40-flash" aria-hidden="true"></span></button></span></div>
      <div class="title">히트스톱 임팩트 프리즈</div>
      <div class="meta"><b>누르기 전</b> 타격 직전 에너지가 응축된 듯 미세하게 부풀었다 멈칫(scale 1.018↔1.015)하는 긴장된 펄스. 본체는 그대로, 곧 터질 듯한 정적 텐션만.</div>
      <div class="meta"><b>눌렀을 때</b> 빠르게 임팩트로 스쿼시(1.14×0.82)한 뒤 접촉 프레임에서 짧고 강하게 HOLD(같은 값 유지=히트스톱)로 시간이 멈췄다가, 급반발로 풀리며(0.93×1.1) 작은 오버슈트로 정착. 프리즈 프레임 동안만 소프트 임팩트 플래시 링이 번쩍인다.</div>
    </figure>
    <figure class="card g49">
      <span class="num">49</span>
      <div class="stage"><span class="zoom"><button class="grape" aria-label="블롭 보더라디우스 모프"><span class="g49-clip" aria-hidden="true"></span><span class="g49-gloss" aria-hidden="true"></span></button></span></div>
      <div class="title">블롭 보더라디우스 모프</div>
      <div class="meta"><b>누르기 전</b> 8값 슬래시 border-radius가 아주 느리게(7.5s) 부드러운 블롭 형태들 사이를 오가며, 미세 회전·스케일과 함께 살아있는 점토 덩어리처럼 출렁인다. 항상 둥근 유기체 형태를 유지하고 한 사이클마다 정확히 50%(완전 원)로 복귀한다.</div>
      <div class="meta"><b>눌렀을 때</b> 탭하면 border-radius가 과장된 비대칭 블롭으로 확 일그러지며(scaleX/Y 동반 스쿼시) 큼직하게 말랑 변형된 뒤, 2단계 감쇠 흔들림을 거쳐 정확히 50% 원으로 착지한다. 라디얼 클레이 본체·인셋·하이라이트는 전 구간 그대로 따라 휘어 평면화되지 않는다.</div>
    </figure>
    <figure class="card g17">
      <span class="num">17</span>
      <div class="stage"><span class="zoom"><button class="grape" aria-label="점토 눌림 — 깊이 프레스인"></button></span></div>
      <div class="title">점토 눌림 — 깊이 프레스인</div>
      <div class="meta"><b>누르기 전</b> 다음 차례 포도알이 약 2.6초 주기로 아주 살짝 안쪽으로 눌렸다(바깥 그림자 축소+미세 0.97 스케일) 부드럽게 복귀하며 '눌러봐'를 알린다. 라디얼 음영·inset 깊이는 유지된 채 빛만 1mm 호흡한다.</div>
      <div class="meta"><b>눌렀을 때</b> 누르면 점토가 손가락에 눌리듯 바깥 그림자가 사라지고 inset 그림자가 깊어지며 0.86까지 가라앉았다가, easeOutBack 오버슈트로 1.06까지 통통 튀어 원상복귀.</div>
    </figure></main>
 <footer>모든 시안: 원본 클레이 3D 음영 유지 · 테두리·이모지 없음 · 1.55배 확대 보기</footer>
<script>
 function fire(g){g.classList.remove('play');void g.offsetWidth;g.classList.add('play');clearTimeout(g._t);g._t=setTimeout(()=>g.classList.remove('play'),1250);}
 const grapes=[...document.querySelectorAll('.grape')];
 grapes.forEach(g=>g.addEventListener('click',()=>fire(g)));
 document.getElementById('once').addEventListener('click',()=>grapes.forEach((g,i)=>setTimeout(()=>fire(g),i*120)));
 let auto=true,timer=null;
 function loop(){ grapes.forEach((g,i)=>setTimeout(()=>fire(g),i*180)); }
 function start(){ if(timer)clearInterval(timer); loop(); timer=setInterval(loop,2600); }
 function stop(){ if(timer)clearInterval(timer); timer=null; }
 document.getElementById('toggle').addEventListener('click',function(){auto=!auto;this.textContent='자동 반복: '+(auto?'켜짐':'꺼짐');if(auto)start();else stop();});
 start();
</script></body></html>
