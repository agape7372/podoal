<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>아바타 중앙정렬 튜너 · podoal</title>
<style>
  /* ── 실제 Avatar 코인 토큰을 그대로 복제 (globals.css) ──
     --clay-cream:#FBFCEE  --warm-border:#ECE0F3
     clay-sm: border 1.2px / box-shadow 1.5px 2px 0 rgba(73,50,100,.04)
     coin: rounded-full + bg-clay-cream + clay-sm, overflow 없음(=img 클립은 svg viewBox가 담당) */
  :root{
    --cream:#FBFCEE;
    --border:#ECE0F3;
    --shadow:1.5px 2px 0 rgba(73,50,100,.04);
    --page:#FFFFFF;            /* --clay-bg */
    --ink:#4b3a5a; --sub:#8a7a98; --line:#ECE0F3; --accent:#B28CDC;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--page);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    -webkit-text-size-adjust:100%;
    padding:0 0 80px;
  }
  body.bg-soft{ --page:#F6F1FB; }
  body.bg-dark{ --page:#2a2333; --ink:#efe9f6; --sub:#b6a9c6; }

  header{
    position:sticky; top:0; z-index:5;
    background:color-mix(in srgb, var(--page) 88%, transparent);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:12px 16px;
  }
  h1{font-size:17px; margin:0 0 4px; letter-spacing:-.01em}
  .hint{font-size:12px; color:var(--sub); line-height:1.5; margin:0}
  .toolbar{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
  button, .seg{
    font:inherit; font-size:12.5px; cursor:pointer; user-select:none;
    border:1.2px solid var(--border); background:#fff; color:var(--ink);
    border-radius:11px; padding:7px 11px; box-shadow:var(--shadow);
  }
  body.bg-dark button, body.bg-dark .seg{ background:#3a3147; color:var(--ink) }
  button:active{transform:translate(1px,1.5px); box-shadow:none}
  button.on{ background:var(--accent); color:#fff; border-color:var(--accent) }
  .seg{display:inline-flex; gap:0; padding:0; overflow:hidden}
  .seg button{border:0; border-radius:0; box-shadow:none; border-right:1px solid var(--border)}
  .seg button:last-child{border-right:0}

  main{max-width:760px; margin:0 auto; padding:14px}

  .card{
    border:1px solid var(--line); border-radius:18px; background:color-mix(in srgb,var(--page) 60%, #fff);
    padding:14px; margin-bottom:14px;
  }
  body.bg-dark .card{ background:#332b40 }
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px}
  .card-head h2{font-size:15px; margin:0; display:flex; align-items:baseline; gap:8px}
  .card-head .kind{font-size:11px; color:var(--sub); font-weight:400}
  .grid{display:grid; grid-template-columns:236px 1fr; gap:16px}
  @media(max-width:620px){ .grid{grid-template-columns:1fr; gap:14px} }

  /* ── 코인 (실제 토큰 복제) ── */
  .coin{
    background:var(--cream);
    border:1.2px solid var(--border);
    box-shadow:var(--shadow);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    /* overflow 없음 — Avatar와 동일. 클립은 스프라이트 svg가 담당 */
  }
  .coin svg{display:block; overflow:hidden}  /* = <img>의 viewBox 클립 재현 */

  .editor{display:flex; flex-direction:column; align-items:center; gap:8px}
  .stage{position:relative; width:220px; height:220px; touch-action:none}
  .coin.big{width:220px; height:220px; cursor:grab}
  .coin.big:active{cursor:grabbing}
  .coin.big:focus-visible{outline:2.5px solid var(--accent); outline-offset:3px}
  .guides{position:absolute; inset:0; pointer-events:none; display:none}
  body.show-guides .guides{display:block}
  .readout{font-size:11.5px; color:var(--sub); font-variant-numeric:tabular-nums; text-align:center; line-height:1.5}
  .readout b{color:var(--ink); font-weight:600}
  .xfm{font-size:10px; color:var(--sub); word-break:break-all; max-width:220px}

  .controls{display:flex; flex-direction:column; gap:10px; min-width:0}
  .row{display:flex; align-items:center; gap:9px}
  .row label{width:14px; font-size:12px; color:var(--sub); font-weight:600}
  .row input[type=range]{flex:1; min-width:0; accent-color:var(--accent)}
  .row input[type=number]{width:62px; font:inherit; font-size:12px; padding:5px 6px; border:1.2px solid var(--border); border-radius:8px; background:#fff; color:var(--ink); font-variant-numeric:tabular-nums}
  body.bg-dark .row input[type=number]{background:#3a3147; color:var(--ink)}
  .adv{border-top:1px dashed var(--line); padding-top:9px; margin-top:1px}
  .mini-btns{display:flex; flex-wrap:wrap; gap:6px}
  .mini-btns button{font-size:11.5px; padding:5px 9px}

  /* 실측 크기 프리뷰 */
  .previews{display:flex; align-items:flex-end; gap:14px; margin-top:2px}
  .pv{display:flex; flex-direction:column; align-items:center; gap:5px}
  .pv span{font-size:10px; color:var(--sub)}

  /* 세트 그리드 */
  .setgrid{display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:6px 0}
  .setgrid .cell{display:flex; flex-direction:column; align-items:center; gap:5px}
  .setgrid .cell span{font-size:10px; color:var(--sub)}

  .export{margin-top:6px}
  .export textarea{
    width:100%; height:128px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px;
    border:1.2px solid var(--border); border-radius:12px; padding:10px; resize:vertical;
    background:#fff; color:var(--ink);
  }
  body.bg-dark .export textarea{background:#26202f; color:#e9e2f2}
  .export .actions{display:flex; gap:8px; margin-top:8px}
  .ok{color:#3f9a6b; font-size:12px; align-self:center}
  .status{font-size:12px; color:var(--sub); padding:14px}
</style>
</head>
<body class="show-guides">

<header>
  <h1>🍇 아바타 중앙정렬 튜너</h1>
  <p class="hint">
    각 과일을 <b>코인 안에서 드래그</b>하거나 슬라이더로 옮겨, <b>내 눈에 정중앙</b>으로 맞추세요.
    오른쪽 <b>실측 프리뷰(sm·md·lg·xl)</b>와 맨 아래 <b>세트 그리드</b>로 실제 크기·세트 균형을 확인하세요.
    다 맞추면 아래 <b>JSON을 복사</b>해 채팅으로 보내주시면 제가 SVG에 반영합니다.
  </p>
  <div class="toolbar">
    <button id="t-guides" class="on">가이드선</button>
    <span class="seg" role="group" aria-label="배경">
      <button data-bg="white" class="on">흰색</button>
      <button data-bg="soft">연보라</button>
      <button data-bg="dark">어둠</button>
    </span>
    <button id="reset-all">전체 리셋</button>
    <button id="copy-top">JSON 복사</button>
  </div>
</header>

<main>
  <div id="cards" class="status">아바타 불러오는 중…</div>

  <section class="card" id="set-card" style="display:none">
    <div class="card-head"><h2>세트 그리드 <span class="kind">실제 피커 크기(md)</span></h2></div>
    <div class="setgrid" id="setgrid"></div>
  </section>

  <section class="card export" id="export-card" style="display:none">
    <div class="card-head"><h2>내보내기 <span class="kind">이 JSON을 복사해 보내주세요</span></h2></div>
    <textarea id="out" readonly spellcheck="false"></textarea>
    <div class="actions">
      <button id="copy-json">📋 복사</button>
      <button id="download-json">⬇ 다운로드</button>
      <span class="ok" id="copied" hidden>복사됨 ✓</span>
    </div>
  </section>
</main>

<script>
const FRUITS = [
  ['grape','포도'], ['strawberry','딸기'], ['orange','오렌지'], ['blueberry','블루베리'],
  ['cherry','체리'], ['peach','복숭아'], ['apple','사과'], ['watermelon','수박'],
];
// 실제 Avatar.tsx sizeMap (coin px / sprite px)
const SIZES = [['sm',32,22],['md',40,28],['lg',56,38],['xl',80,56]];
const EDIT = 220, EDIT_SPRITE = Math.round(EDIT*0.70); // = 154, Avatar 56/80 비율
const VB = 32, CLAMP = 12;

const art = {};                 // fruit -> 원본 아트 마크업 (wrapper strip 후)
const state = {};               // fruit -> {tx,ty,s}
FRUITS.forEach(([f])=> state[f] = {tx:0, ty:0, s:1});

const xmls = new XMLSerializer();
function innerMarkup(el){
  return Array.from(el.childNodes).map(n=> xmls.serializeToString(n)).join('');
}
// 현재 SVG에서 <g data-centered> wrapper를 벗겨 원본 아트(0,0)만 추출
function stripWrapper(svgText){
  const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  if(!svg) return svgText;
  const g = svg.querySelector('g[data-centered]');
  return innerMarkup(g || svg);
}
function transformStr(s){
  let t = `translate(${round(s.tx)} ${round(s.ty)})`;
  if(Math.abs(s.s-1) > 1e-6) t += ` translate(16 16) scale(${round(s.s,3)}) translate(-16 -16)`;
  return t;
}
function round(n, d=2){ const p=10**d; return Math.round(n*p)/p; }

// 스프라이트 svg 1개 생성: <svg viewBox 0 0 32 32 w h><g class=art data-fruit transform>ART</g></svg>
function sprite(fruit, px){
  const wrap = document.createElement('div');
  wrap.innerHTML =
    `<svg viewBox="0 0 ${VB} ${VB}" width="${px}" height="${px}" xmlns="http://www.w3.org/2000/svg">`+
    `<g class="art" data-fruit="${fruit}">${art[fruit]}</g></svg>`;
  const g = wrap.querySelector('g.art');
  g.setAttribute('transform', transformStr(state[fruit]));
  return wrap.firstElementChild;
}
function coin(fruit, coinPx, spritePx, extraClass=''){
  const d = document.createElement('div');
  d.className = 'coin '+extraClass;
  d.style.width = d.style.height = coinPx+'px';
  d.appendChild(sprite(fruit, spritePx));
  return d;
}

// 모든 g.art[data-fruit=f] 동기 업데이트 (편집/프리뷰/세트 그리드)
function renderFruit(f){
  const t = transformStr(state[f]);
  document.querySelectorAll(`g.art[data-fruit="${CSS.escape(f)}"]`).forEach(g=> g.setAttribute('transform', t));
  const r = document.querySelector(`[data-readout="${f}"]`);
  if(r){
    const s = state[f];
    r.innerHTML = `x <b>${round(s.tx)}</b> · y <b>${round(s.ty)}</b>`+ (Math.abs(s.s-1)>1e-6? ` · ×<b>${round(s.s,3)}</b>`:'');
  }
  const x = document.querySelector(`[data-xfm="${f}"]`); if(x) x.textContent = `transform="${t}"`;
  syncInputs(f);
  updateExport();
}
function syncInputs(f){
  const s = state[f];
  [['tx',s.tx],['ty',s.ty],['s',s.s]].forEach(([k,v])=>{
    const rng = document.querySelector(`input[data-k="${k}"][data-f="${f}"][type=range]`);
    const num = document.querySelector(`input[data-k="${k}"][data-f="${f}"][type=number]`);
    if(rng) rng.value = v; if(num) num.value = round(v, k==='s'?3:2);
  });
}
function setVal(f, k, v){
  if(k==='s') v = clamp(v, 0.85, 1.15);
  else v = clamp(v, -CLAMP, CLAMP);
  state[f][k] = v; renderFruit(f);
}
function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }

function updateExport(){
  const obj = {};
  FRUITS.forEach(([f])=> obj[f] = {tx:round(state[f].tx), ty:round(state[f].ty), s:round(state[f].s,3)});
  const ta = document.getElementById('out'); if(ta) ta.value = JSON.stringify(obj, null, 2);
}

// ── 캔버스 알파 스캔: 시작점 추정 (참고용) ──
function estimate(f, mode){
  const W = 128;
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${VB} ${VB}" width="${W}" height="${W}"><g>${art[f]}</g></svg>`;
  const img = new Image();
  img.onload = ()=>{
    const c = document.createElement('canvas'); c.width=c.height=W;
    const ctx = c.getContext('2d'); ctx.drawImage(img,0,0,W,W);
    const data = ctx.getImageData(0,0,W,W).data;
    let minX=W,minY=W,maxX=0,maxY=0, sx=0,sy=0,sa=0, any=false;
    for(let y=0;y<W;y++) for(let x=0;x<W;x++){
      const a = data[(y*W+x)*4+3];
      if(a>16){ any=true; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; sx+=x*a; sy+=y*a; sa+=a; }
    }
    if(!any) return;
    let cx,cy;
    if(mode==='mass'){ cx=sx/sa; cy=sy/sa; } else { cx=(minX+maxX)/2; cy=(minY+maxY)/2; }
    // 캔버스 px → viewBox 단위, 중심(16,16)으로 이동시키는 translate
    state[f].tx = clamp(16 - cx/W*VB, -CLAMP, CLAMP);
    state[f].ty = clamp(16 - cy/W*VB, -CLAMP, CLAMP);
    renderFruit(f);
  };
  img.src = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
}

// ── 카드 빌드 ──
function buildCard([f, label]){
  const card = document.createElement('section');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <h2>${label} <span class="kind">${f}</span></h2>
      <button data-reset="${f}">리셋</button>
    </div>
    <div class="grid">
      <div class="editor">
        <div class="stage">
          <div class="coin big" tabindex="0" data-stage="${f}" role="img" aria-label="${label} 편집 코인"></div>
          <svg class="guides" viewBox="0 0 ${EDIT} ${EDIT}" aria-hidden="true">
            <rect x="${(EDIT-EDIT_SPRITE)/2}" y="${(EDIT-EDIT_SPRITE)/2}" width="${EDIT_SPRITE}" height="${EDIT_SPRITE}" fill="none" stroke="rgba(178,140,220,.45)" stroke-dasharray="4 4"/>
            <line x1="${EDIT/2}" y1="6" x2="${EDIT/2}" y2="${EDIT-6}" stroke="rgba(178,140,220,.5)"/>
            <line x1="6" y1="${EDIT/2}" x2="${EDIT-6}" y2="${EDIT/2}" stroke="rgba(178,140,220,.5)"/>
            <circle cx="${EDIT/2}" cy="${EDIT/2}" r="40" fill="none" stroke="rgba(178,140,220,.28)"/>
            <circle cx="${EDIT/2}" cy="${EDIT/2}" r="2.5" fill="rgba(178,140,220,.8)"/>
          </svg>
        </div>
        <div class="readout" data-readout="${f}"></div>
        <div class="xfm" data-xfm="${f}"></div>
      </div>
      <div class="controls">
        <div class="row"><label>X</label>
          <input type="range" data-k="tx" data-f="${f}" min="-${CLAMP}" max="${CLAMP}" step="0.05" value="0">
          <input type="number" data-k="tx" data-f="${f}" min="-${CLAMP}" max="${CLAMP}" step="0.05" value="0"></div>
        <div class="row"><label>Y</label>
          <input type="range" data-k="ty" data-f="${f}" min="-${CLAMP}" max="${CLAMP}" step="0.05" value="0">
          <input type="number" data-k="ty" data-f="${f}" min="-${CLAMP}" max="${CLAMP}" step="0.05" value="0"></div>
        <div class="adv row"><label>×</label>
          <input type="range" data-k="s" data-f="${f}" min="0.85" max="1.15" step="0.005" value="1">
          <input type="number" data-k="s" data-f="${f}" min="0.85" max="1.15" step="0.005" value="1"></div>
        <div class="mini-btns">
          <button data-est="${f}" data-mode="bbox">추정·외곽</button>
          <button data-est="${f}" data-mode="mass">추정·무게</button>
        </div>
        <div class="previews" data-previews="${f}"></div>
      </div>
    </div>`;
  // 편집 코인
  card.querySelector(`[data-stage="${f}"]`).appendChild(sprite(f, EDIT_SPRITE));
  // 실측 프리뷰
  const pv = card.querySelector(`[data-previews="${f}"]`);
  SIZES.forEach(([name,coinPx,spritePx])=>{
    const cell = document.createElement('div'); cell.className='pv';
    cell.appendChild(coin(f, coinPx, spritePx));
    const s = document.createElement('span'); s.textContent = name+' '+coinPx; cell.appendChild(s);
    pv.appendChild(cell);
  });
  return card;
}

// ── 드래그 ──
function wireDrag(stage, f){
  let active=false, lastX=0, lastY=0;
  const scale = EDIT_SPRITE / VB;  // px per viewBox unit
  stage.addEventListener('pointerdown', e=>{
    active=true; lastX=e.clientX; lastY=e.clientY; stage.setPointerCapture(e.pointerId); stage.focus();
  });
  stage.addEventListener('pointermove', e=>{
    if(!active) return; e.preventDefault();
    const dx=(e.clientX-lastX)/scale, dy=(e.clientY-lastY)/scale;
    lastX=e.clientX; lastY=e.clientY;
    state[f].tx = clamp(state[f].tx+dx, -CLAMP, CLAMP);
    state[f].ty = clamp(state[f].ty+dy, -CLAMP, CLAMP);
    renderFruit(f);
  });
  const end = e=>{ active=false; try{stage.releasePointerCapture(e.pointerId);}catch(_){} };
  stage.addEventListener('pointerup', end);
  stage.addEventListener('pointercancel', end);
  stage.addEventListener('keydown', e=>{
    const step = e.shiftKey?0.5:0.05; let k,d;
    if(e.key==='ArrowLeft'){k='tx';d=-step} else if(e.key==='ArrowRight'){k='tx';d=step}
    else if(e.key==='ArrowUp'){k='ty';d=-step} else if(e.key==='ArrowDown'){k='ty';d=step} else return;
    e.preventDefault(); setVal(f,k, state[f][k]+d);
  });
}

// ── 초기화 ──
async function init(){
  try{
    await Promise.all(FRUITS.map(async ([f])=>{
      const res = await fetch(`/avatars/${f}.svg`, {cache:'no-store'});
      art[f] = stripWrapper(await res.text());
    }));
  }catch(err){
    document.getElementById('cards').textContent = '아바타 로드 실패: '+err;
    return;
  }
  const cards = document.getElementById('cards');
  cards.className=''; cards.innerHTML='';
  FRUITS.forEach(pair=>{
    const card = buildCard(pair); cards.appendChild(card);
    wireDrag(card.querySelector(`[data-stage="${pair[0]}"]`), pair[0]);
  });

  // 세트 그리드 (md 코인 = 실제 피커 크기)
  const sg = document.getElementById('setgrid');
  FRUITS.forEach(([f,label])=>{
    const cell = document.createElement('div'); cell.className='cell';
    cell.appendChild(coin(f, 40, 28)); // md
    const s=document.createElement('span'); s.textContent=label; cell.appendChild(s);
    sg.appendChild(cell);
  });
  document.getElementById('set-card').style.display='';
  document.getElementById('export-card').style.display='';

  // 입력 이벤트
  document.addEventListener('input', e=>{
    const t=e.target; const k=t.dataset.k, f=t.dataset.f;
    if(k&&f) setVal(f,k, parseFloat(t.value)||0);
  });
  document.addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b) return;
    if(b.dataset.reset){ const f=b.dataset.reset; state[f]={tx:0,ty:0,s:1}; renderFruit(f); }
    if(b.dataset.est){ estimate(b.dataset.est, b.dataset.mode); }
  });

  // 툴바
  document.getElementById('t-guides').addEventListener('click', e=>{
    document.body.classList.toggle('show-guides'); e.currentTarget.classList.toggle('on');
  });
  document.querySelectorAll('[data-bg]').forEach(btn=> btn.addEventListener('click', ()=>{
    document.body.classList.remove('bg-soft','bg-dark');
    if(btn.dataset.bg==='soft') document.body.classList.add('bg-soft');
    if(btn.dataset.bg==='dark') document.body.classList.add('bg-dark');
    document.querySelectorAll('[data-bg]').forEach(b=> b.classList.toggle('on', b===btn));
  }));
  document.getElementById('reset-all').addEventListener('click', ()=>{
    FRUITS.forEach(([f])=>{ state[f]={tx:0,ty:0,s:1}; renderFruit(f); });
  });
  const doCopy = async ()=>{
    const ta=document.getElementById('out');
    try{ await navigator.clipboard.writeText(ta.value); }
    catch(_){ ta.removeAttribute('readonly'); ta.select(); document.execCommand&&document.execCommand('copy'); ta.setAttribute('readonly',''); }
    const ok=document.getElementById('copied'); ok.hidden=false; setTimeout(()=>ok.hidden=true, 1400);
  };
  document.getElementById('copy-json').addEventListener('click', doCopy);
  document.getElementById('copy-top').addEventListener('click', doCopy);
  document.getElementById('download-json').addEventListener('click', ()=>{
    const blob=new Blob([document.getElementById('out').value], {type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='avatar-nudges.json';
    a.click(); URL.revokeObjectURL(a.href);
  });

  FRUITS.forEach(([f])=> renderFruit(f));
}
init();
</script>
</body>
</html>
