 document.querySelectorAll('.grape').forEach(g=>g.addEventListener('click',()=>fire(g)));
 document.getElementById('playAll').addEventListener('click',()=>document.querySelectorAll('.card:not([hidden]) .grape').forEach((g,i)=>setTimeout(()=>fire(g),i*60)));
 let po=false;document.getElementById('onlyPicks').addEventListener('click',function(){po=!po;this.textContent=po?'전체 보기':'추천만';apply();});
 let fam='';document.getElementById('chips').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');fam=b.dataset.f||'';apply();});
 function apply(){document.querySelectorAll('.card').forEach(c=>{const okF=!fam||c.dataset.fam===fam;const okP=!po||c.querySelector('.pick');c.hidden=!(okF&&okP);});}
 const io=new IntersectionObserver(es=>es.forEach(e=>e.target.classList.toggle('paused',!e.isIntersecting)),{rootMargin:'120px'});
 document.querySelectorAll('.card').forEach(c=>io.observe(c));
</script></body></html>
