<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#DCC4F2">
<title>포도알 애니메이션 랩 · 20안</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(120% 80% at 50% -8%, #F0E7FB 0%, #F3ECFA 58%, #EEE9F6 100%);
    color:#2F2A3F;font-family:'Noto Sans KR',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;padding:22px 14px 70px;word-break:keep-all;
  }
  header{max-width:1120px;margin:0 auto 6px;text-align:center}
  h1{font-size:21px;margin:0 0 7px;letter-spacing:-0.02em;font-weight:800}
  .lead{font-size:13px;color:#6E6680;margin:0 auto;max-width:600px;line-height:1.65}
  .toolbar{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:15px}
  .btn{font:inherit;font-size:13px;font-weight:700;color:#fff;
    background:linear-gradient(145deg,#B28CDC,#9B7ED8);border:0;border-radius:999px;
    padding:10px 20px;cursor:pointer;
    box-shadow:0 7px 16px rgba(123,95,184,0.30), inset 0 1px 1px rgba(255,255,255,0.45);}
  .btn.ghost{color:#6E54AA;background:#FBF7FF;box-shadow:0 4px 12px rgba(73,50,100,0.10)}
  .btn:active{transform:scale(0.96)}
  .grid{max-width:1120px;margin:24px auto 0;display:grid;gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(165px,1fr))}
  .card{position:relative;background:#FCF9FF;border-radius:22px;padding:18px 14px 15px;overflow:visible;
    box-shadow:0 12px 26px rgba(73,50,100,0.09), 0 2px 6px rgba(73,50,100,0.05);
    display:flex;flex-direction:column;align-items:center;text-align:center}
  .num{position:absolute;top:12px;left:15px;font-size:11px;font-weight:800;color:#C3B7D8;letter-spacing:0.04em}
  .pick{position:absolute;top:11px;right:13px;font-size:10px;font-weight:800;color:#6E54AA;
    background:#EFE6FB;border-radius:999px;padding:3px 9px}
  .stage{height:122px;width:100%;display:flex;align-items:center;justify-content:center;margin:8px 0 12px;overflow:visible}
  .title{font-size:13.5px;font-weight:700;margin:0 0 7px;letter-spacing:-0.01em;line-height:1.35}
  .meta{font-size:11px;color:#6E6680;line-height:1.55}
  .meta b{color:#9B7ED8;font-weight:800;font-size:10px}
  .fam{font-size:10px;color:#A89FB8;margin-top:8px;line-height:1.4}
  .ref{font-size:9.5px;color:#BDB3CE;margin-top:3px;line-height:1.3}
  footer{max-width:1120px;margin:34px auto 0;text-align:center;font-size:11px;color:#A89FB8;line-height:1.6}
  .card.paused .grape, .card.paused .grape *{animation-play-state:paused !important}

  /* ── 원본 클레이 3D 포도알(전역 1회) ── */
  
.grape{
  position:relative;width:76px;height:76px;border-radius:50%;
  border:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;display:block;
  background:
    radial-gradient(circle at 33% 27%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0) 30%),
    radial-gradient(circle at 50% 116%, rgba(74,54,121,0.28) 0%, rgba(74,54,121,0) 56%),
    radial-gradient(circle at 38% 34%, #E7D1FA 0%, #CDB0EE 34%, #9B7ED8 72%, #6E54AA 100%);
  box-shadow:0 7px 16px rgba(73,50,100,0.20), inset 0 -4px 7px rgba(94,63,128,0.28), inset 0 4px 7px rgba(255,255,255,0.40);
  transform:translateZ(0);
}

/* ===== g17 · 점토 눌림 — 깊이 프레스인 ===== */
.g17 .grape{transition:none;animation:g17-idle 2600ms ease-in-out infinite;}
.g17 .grape::after{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;box-shadow:inset 0 5px 9px rgba(94,63,128,0.30),inset 0 -3px 6px rgba(255,255,255,0.30);opacity:0;transition:none;}
.g17 .g17-crumbs{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none;}
.g17 .g17-crumbs i{position:absolute;left:0;top:0;width:9px;height:9px;margin:-4px 0 0 -4px;opacity:0;background:radial-gradient(circle at 35% 30%,#E7D1FA 0%,#CDB0EE 45%,#9B7ED8 100%);box-shadow:0 2px 4px rgba(73,50,100,0.22);}
.g17 .g17-crumbs i:nth-child(1){border-radius:60% 40% 55% 45%/55% 60% 40% 45%;}
.g17 .g17-crumbs i:nth-child(2){border-radius:50%;width:7px;height:7px;background:radial-gradient(circle at 35% 30%,#EFF5BB 0%,#CFDC78 100%);}
.g17 .g17-crumbs i:nth-child(3){border-radius:45% 55% 50% 50%/60% 45% 55% 40%;}
.g17 .g17-crumbs i:nth-child(4){border-radius:50%;width:6px;height:6px;}
.g17 .g17-crumbs i:nth-child(5){border-radius:58% 42% 48% 52%/50% 55% 45% 50%;width:11px;height:11px;background:radial-gradient(circle at 35% 30%,#CDB0EE 0%,#B28CDC 60%,#7D58A8 100%);}
.g17 .g17-crumbs i:nth-child(6){border-radius:50%;width:5px;height:5px;background:radial-gradient(circle at 35% 30%,#E2EC9A 0%,#CFDC78 100%);}
.g17 .grape.play{animation:g17-press 1100ms cubic-bezier(0.34,1.56,0.64,1) 1;}
.g17 .grape.play::after{animation:g17-deepen 1100ms ease-out 1;}
.g17 .grape.play .g17-crumbs i{animation:g17-crumb 950ms cubic-bezier(0.2,0.7,0.3,1) 1;}
.g17 .grape.play .g17-crumbs i:nth-child(1){--g17-dx:-30px;--g17-dr:-160deg;animation-delay:60ms;}
.g17 .grape.play .g17-crumbs i:nth-child(2){--g17-dx:24px;--g17-dr:200deg;animation-delay:90ms;animation-duration:1010ms;}
.g17 .grape.play .g17-crumbs i:nth-child(3){--g17-dx:-14px;--g17-dr:120deg;animation-delay:70ms;animation-duration:880ms;}
.g17 .grape.play .g17-crumbs i:nth-child(4){--g17-dx:34px;--g17-dr:-90deg;animation-delay:110ms;}
.g17 .grape.play .g17-crumbs i:nth-child(5){--g17-dx:8px;--g17-dr:150deg;animation-delay:55ms;animation-duration:1000ms;}
.g17 .grape.play .g17-crumbs i:nth-child(6){--g17-dx:-26px;--g17-dr:-210deg;animation-delay:120ms;animation-duration:860ms;}
@keyframes g17-idle{0%,100%{transform:translateZ(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}48%{transform:translateZ(0) scale(0.975);box-shadow:0 4px 10px rgba(73,50,100,0.18),inset 0 -2px 5px rgba(94,63,128,0.34),inset 0 3px 6px rgba(255,255,255,0.34);}}
@keyframes g17-press{0%{transform:translateZ(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}16%{transform:translateZ(0) scale(0.9,0.82);box-shadow:0 2px 6px rgba(73,50,100,0.14),inset 0 7px 12px rgba(94,63,128,0.40),inset 0 -2px 5px rgba(255,255,255,0.30);}34%{transform:translateZ(0) scale(0.86,0.9);box-shadow:0 2px 5px rgba(73,50,100,0.14),inset 0 8px 13px rgba(94,63,128,0.42),inset 0 -2px 5px rgba(255,255,255,0.28);}62%{transform:translateZ(0) scale(1.06,1.02);box-shadow:0 10px 20px rgba(73,50,100,0.22),inset 0 -4px 7px rgba(94,63,128,0.26),inset 0 4px 7px rgba(255,255,255,0.42);}100%{transform:translateZ(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}}
@keyframes g17-deepen{0%{opacity:0;}18%{opacity:1;}55%{opacity:0.5;}100%{opacity:0;}}
@keyframes g17-crumb{0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(0.4);}12%{opacity:1;transform:translate(calc(var(--g17-dx)*0.4),-12px) rotate(calc(var(--g17-dr)*0.3)) scale(1);}100%{opacity:0;transform:translate(var(--g17-dx),46px) rotate(var(--g17-dr)) scale(0.7);}}
@media (prefers-reduced-motion: reduce){.g17 .grape,.g17 .grape.play,.g17 .grape::after,.g17 .grape.play::after,.g17 .g17-crumbs i,.g17 .grape.play .g17-crumbs i{animation:none;}.g17 .grape.play{box-shadow:0 4px 10px rgba(73,50,100,0.18),inset 0 6px 11px rgba(94,63,128,0.38),inset 0 -2px 5px rgba(255,255,255,0.30);}}

/* ===== g10 · 말랑 클레이 크럼 버스트 ===== */
/* ===== g10 · 말랑 클레이 크럼 버스트 ===== */
.g10 .grape{ animation:g10-tilt 4s ease-in-out infinite; }
@keyframes g10-tilt{ 0%,100%{ transform:perspective(220px) rotateX(0deg) rotateY(0deg);} 25%{ transform:perspective(220px) rotateX(2.2deg) rotateY(-2.6deg);} 50%{ transform:perspective(220px) rotateX(0deg) rotateY(0deg);} 75%{ transform:perspective(220px) rotateX(-2deg) rotateY(2.4deg);} }
.g10 .grape::after{ content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none; background:radial-gradient(circle at 32% 26%, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 30%); mix-blend-mode:screen; opacity:0; animation:g10-sheen 4s ease-in-out infinite; }
@keyframes g10-sheen{ 0%,100%{opacity:.15} 50%{opacity:.6} }
.g10 .grape.play{ animation:g10-squish 600ms cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes g10-squish{ 0%{transform:perspective(220px) scale(1,1);} 22%{transform:perspective(220px) scale(1.12,0.88);} 50%{transform:perspective(220px) scale(0.94,1.07);} 78%{transform:perspective(220px) scale(1.02,0.98);} 100%{transform:perspective(220px) scale(1,1);} }
.g10 .g10-crumbs{ position:absolute; inset:0; pointer-events:none; }
.g10 .g10-crumbs b{ position:absolute; left:50%; top:50%; opacity:0; will-change:transform,opacity; background:radial-gradient(circle at 36% 32%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 42%), var(--c); box-shadow:inset 0 -2px 3px rgba(94,63,128,0.30); }
.g10 .grape.play .g10-crumbs b{ animation:g10-tumble 940ms cubic-bezier(0.33,1,0.68,1) forwards; animation-delay:var(--d); }
.g10 .g10-crumbs b:nth-child(1){ --tx:-50px;--ty:-52px;--rot:220deg;--d:6ms;  width:14px;height:13px;border-radius:46% 54% 60% 40%/52% 44% 56% 48%; --c:#C9A8E8; }
.g10 .g10-crumbs b:nth-child(2){ --tx:48px; --ty:-56px;--rot:-200deg;--d:0ms; width:11px;height:12px;border-radius:60% 40% 45% 55%/58% 50% 50% 42%; --c:#CFDC78; }
.g10 .g10-crumbs b:nth-child(3){ --tx:-64px;--ty:-18px;--rot:160deg;--d:30ms; width:10px;height:10px;border-radius:50% 50% 55% 45%/55% 45% 55% 45%; --c:#B28CDC; }
.g10 .g10-crumbs b:nth-child(4){ --tx:62px; --ty:-12px;--rot:-260deg;--d:20ms;width:12px;height:11px;border-radius:42% 58% 52% 48%/60% 48% 52% 40%; --c:#E2EC9A; }
.g10 .g10-crumbs b:nth-child(5){ --tx:-22px;--ty:-66px;--rot:300deg;--d:44ms; width:9px;height:10px;border-radius:55% 45% 48% 52%/50% 56% 44% 50%; --c:#9B7ED8; }
.g10 .g10-crumbs b:nth-child(6){ --tx:26px; --ty:-68px;--rot:-160deg;--d:12ms;width:13px;height:12px;border-radius:48% 52% 58% 42%/54% 46% 54% 46%; --c:#CDB0EE; }
.g10 .g10-crumbs b:nth-child(7){ --tx:-58px;--ty:-44px;--rot:180deg;--d:38ms; width:8px;height:9px;border-radius:50%; --c:#CFDC78; }
.g10 .g10-crumbs b:nth-child(8){ --tx:56px; --ty:-40px;--rot:-220deg;--d:26ms;width:10px;height:9px;border-radius:54% 46% 50% 50%/48% 52% 48% 52%; --c:#C9A8E8; }
.g10 .g10-crumbs b:nth-child(9){ --tx:6px;  --ty:-72px;--rot:240deg;--d:50ms; width:9px;height:9px;border-radius:50%; --c:#7D58A8; }
.g10 .g10-crumbs b:nth-child(10){ --tx:-38px;--ty:-58px;--rot:-180deg;--d:16ms;width:11px;height:10px;border-radius:58% 42% 46% 54%/52% 48% 52% 48%; --c:#E2EC9A; }
@keyframes g10-tumble{ 0%{opacity:0; transform:translate(-50%,-50%) translate(0,0) rotate(0deg) scale(.5);} 14%{opacity:1; transform:translate(-50%,-50%) translate(calc(var(--tx)*.45),calc(var(--ty)*.55)) rotate(calc(var(--rot)*.35)) scale(1);} 58%{opacity:1; transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) rotate(calc(var(--rot)*.82)) scale(.96);} 100%{opacity:0; transform:translate(-50%,-50%) translate(calc(var(--tx)*1.04),calc(var(--ty) + 50px)) rotate(var(--rot)) scale(.66);} }
@media (prefers-reduced-motion: reduce){ .g10 .grape, .g10 .grape::after, .g10 .grape.play, .g10 .g10-crumbs b, .g10 .grape.play .g10-crumbs b{ animation:none !important; } .g10 .g10-crumbs b{ opacity:0 !important; } }

/* ===== g18 · 스티커 스탬프 — 찍어 붙이는 보상 ===== */
.g18 .grape{transform-origin:50% 70%;animation:g18-idle 3000ms ease-in-out infinite;}
.g18 .g18-halo{position:absolute;left:50%;top:50%;width:76px;height:76px;margin:-38px 0 0 -38px;border-radius:50%;pointer-events:none;opacity:0;background:radial-gradient(circle,rgba(0,0,0,0) 54%,rgba(155,112,200,0.30) 66%,rgba(155,112,200,0) 78%);}
.g18 .g18-spray{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none;}
.g18 .g18-spray i{position:absolute;left:0;top:0;width:8px;height:8px;margin:-4px 0 0 -4px;opacity:0;background:radial-gradient(circle at 35% 30%,#E7D1FA 0%,#B28CDC 70%,#7D58A8 100%);box-shadow:0 1px 3px rgba(73,50,100,0.20);}
.g18 .g18-spray i:nth-child(odd){border-radius:55% 45% 50% 50%/50% 55% 45% 50%;}
.g18 .g18-spray i:nth-child(even){border-radius:50%;width:6px;height:6px;background:radial-gradient(circle at 35% 30%,#EFF5BB 0%,#CFDC78 100%);}
.g18 .grape.play{animation:g18-stamp 1100ms cubic-bezier(0.34,1.56,0.64,1) 1;}
.g18 .grape.play .g18-halo{animation:g18-ring 700ms cubic-bezier(0.16,0.8,0.3,1) 1;animation-delay:150ms;}
.g18 .grape.play .g18-spray i{animation:g18-fly 780ms cubic-bezier(0.2,0.7,0.3,1) 1;animation-delay:170ms;}
.g18 .grape.play .g18-spray i:nth-child(1){--g18-x:30px;--g18-y:-6px;--g18-r:80deg;}
.g18 .grape.play .g18-spray i:nth-child(2){--g18-x:22px;--g18-y:18px;--g18-r:-120deg;animation-duration:820ms;}
.g18 .grape.play .g18-spray i:nth-child(3){--g18-x:-4px;--g18-y:30px;--g18-r:140deg;}
.g18 .grape.play .g18-spray i:nth-child(4){--g18-x:-26px;--g18-y:16px;--g18-r:-70deg;animation-duration:800ms;}
.g18 .grape.play .g18-spray i:nth-child(5){--g18-x:-32px;--g18-y:-8px;--g18-r:110deg;}
.g18 .grape.play .g18-spray i:nth-child(6){--g18-x:-20px;--g18-y:-26px;--g18-r:-150deg;animation-duration:760ms;}
.g18 .grape.play .g18-spray i:nth-child(7){--g18-x:6px;--g18-y:-32px;--g18-r:60deg;}
.g18 .grape.play .g18-spray i:nth-child(8){--g18-x:26px;--g18-y:-22px;--g18-r:-100deg;animation-duration:830ms;}
@keyframes g18-idle{0%,100%{transform:translateY(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}50%{transform:translateY(-1.5px) scale(1.008);box-shadow:0 10px 18px rgba(73,50,100,0.16),inset 0 -4px 7px rgba(94,63,128,0.26),inset 0 4px 7px rgba(255,255,255,0.42);}}
@keyframes g18-stamp{0%{transform:translateY(-22px) scale(1.18,1.1);box-shadow:0 18px 26px rgba(73,50,100,0.10),inset 0 -4px 7px rgba(94,63,128,0.24),inset 0 4px 7px rgba(255,255,255,0.44);}24%{transform:translateY(0) scale(1.16,0.84);box-shadow:0 3px 8px rgba(73,50,100,0.22),inset 0 -6px 9px rgba(94,63,128,0.34),inset 0 3px 6px rgba(255,255,255,0.36);}40%{transform:translateY(0) scale(0.92,1.08);box-shadow:0 6px 13px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}66%{transform:translateY(0) scale(1.04,0.98);box-shadow:0 8px 17px rgba(73,50,100,0.21),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}100%{transform:translateY(0) scale(1);box-shadow:0 7px 16px rgba(73,50,100,0.20),inset 0 -4px 7px rgba(94,63,128,0.28),inset 0 4px 7px rgba(255,255,255,0.40);}}
@keyframes g18-ring{0%{opacity:0;transform:scale(0.5);}30%{opacity:0.9;}100%{opacity:0;transform:scale(1.7);}}
@keyframes g18-fly{0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(0.4);}25%{opacity:1;transform:translate(calc(var(--g18-x)*0.7),calc(var(--g18-y)*0.7)) rotate(calc(var(--g18-r)*0.5)) scale(1);}100%{opacity:0;transform:translate(var(--g18-x),calc(var(--g18-y) + 20px)) rotate(var(--g18-r)) scale(0.6);}}
@media (prefers-reduced-motion: reduce){.g18 .grape,.g18 .grape.play,.g18 .g18-halo,.g18 .grape.play .g18-halo,.g18 .g18-spray i,.g18 .grape.play .g18-spray i{animation:none;}}

/* ===== g20 · 듀얼레이어 패럴랙스 — 3D 틸트 임팩트 ===== */
.g20{perspective:520px;}
.g20 .stage{perspective:520px;}
.g20 .grape{transform-style:preserve-3d;animation:g20-tilt 4000ms ease-in-out infinite;}
.g20 .g20-spec{position:absolute;left:0;top:0;width:100%;height:100%;border-radius:50%;pointer-events:none;background:radial-gradient(circle at 33% 27%,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0) 34%);transform:translateZ(14px);animation:g20-spec-idle 4000ms ease-in-out infinite;}
.g20 .g20-shards{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none;transform-style:preserve-3d;}
.g20 .g20-shards i{position:absolute;left:0;top:0;width:10px;height:10px;margin:-5px 0 0 -5px;opacity:0;background:radial-gradient(circle at 35% 30%,#E7D1FA 0%,#B28CDC 65%,#7D58A8 100%);box-shadow:0 2px 4px rgba(73,50,100,0.22);}

.g20 .g20-shards i:nth-child(even){border-radius:50%;width:7px;height:7px;background:radial-gradient(circle at 35% 30%,#E2EC9A 0%,#CFDC78 100%);}
.g20 .grape.play{animation:g20-impact 1050ms cubic-bezier(0.34,1.5,0.5,1) 1;}

.g20 .grape.play .g20-shards i:nth-child(1){--g20-x:-32px;--g20-z:34px;--g20-r:-150deg;animation-delay:50ms;}
.g20 .grape.play .g20-shards i:nth-child(2){--g20-x:26px;--g20-z:42px;--g20-r:170deg;animation-delay:100ms;animation-duration:960ms;}
.g20 .grape.play .g20-shards i:nth-child(3){--g20-x:-12px;--g20-z:50px;--g20-r:110deg;animation-delay:70ms;animation-duration:860ms;}
.g20 .grape.play .g20-shards i:nth-child(4){--g20-x:34px;--g20-z:28px;--g20-r:-100deg;animation-delay:130ms;}

/* ===== g15 · 컬러 리플 스윕 ===== */
.g15 .grape{will-change:transform;overflow:hidden}
.g15 .grape::before,.g15 .grape::after{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none}
/* IDLE 채도 스윕 (본체 위 옅은 틴트) */
.g15 .grape::before{background:radial-gradient(circle at 30% 80%,rgba(207,220,120,0.28) 0%,rgba(207,220,120,0) 45%);mix-blend-mode:soft-light;opacity:.7;animation:g15-sweep 5s ease-in-out infinite}
/* PRESS 컬러 리플 */
.g15 .grape::after{background:radial-gradient(circle at 50% 92%,rgba(226,236,154,0.95) 0%,rgba(207,220,120,0.85) 22%,rgba(178,140,220,0.6) 50%,rgba(125,88,168,0) 72%);mix-blend-mode:soft-light;opacity:0;transform:translateY(40%) scale(0.4)}
.g15 .grape.play::after{animation:g15-fill 1000ms cubic-bezier(.22,.7,.3,1) forwards}
.g15 .grape.play{animation:g15-squash 880ms cubic-bezier(.34,1.45,.5,1)}
/* 파티클 (overflow:hidden 본체 밖으로 못 나가니 stage 레벨 별도 레이어) */
.g15 .g15-fx{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none;z-index:3}
.g15 .g15-fx s{position:absolute;left:0;top:0;width:10px;height:10px;margin:-5px;opacity:0;background:radial-gradient(circle at 35% 30%,#EFF5BB 0%,#CFDC78 55%,#9B7ED8 100%)}
.g15 .grape.play .g15-fx s{animation:g15-spit 1000ms linear forwards}
.g15 .g15-fx s:nth-child(1){--g15a:-70deg;--g15d:48px;border-radius:55% 45% 60% 40%;animation-delay:140ms}
.g15 .g15-fx s:nth-child(2){--g15a:-110deg;--g15d:54px;width:7px;height:11px;border-radius:50% 50% 60% 40%;background:radial-gradient(circle at 35% 30%,#E2EC9A,#CDB0EE);animation-delay:120ms}
.g15 .g15-fx s:nth-child(3){--g15a:-40deg;--g15d:42px;width:8px;height:8px;border-radius:50%;animation-delay:170ms}
.g15 .g15-fx s:nth-child(4){--g15a:-140deg;--g15d:50px;border-radius:45% 55% 50% 50%;background:radial-gradient(circle at 35% 30%,#E7D1FA,#B28CDC);animation-delay:130ms}
.g15 .g15-fx s:nth-child(5){--g15a:20deg;--g15d:46px;width:6px;height:10px;border-radius:50% 50% 55% 45%;animation-delay:190ms}
.g15 .g15-fx s:nth-child(6){--g15a:200deg;--g15d:44px;width:7px;height:7px;border-radius:60% 40% 45% 55%;background:radial-gradient(circle at 35% 30%,#CFDC78,#9B7ED8);animation-delay:160ms}
.g15 .g15-fx s:nth-child(7){--g15a:-90deg;--g15d:60px;width:6px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#E2EC9A,#B28CDC);animation-delay:110ms}
.g15 .g15-fx s:nth-child(8){--g15a:240deg;--g15d:40px;width:8px;height:8px;border-radius:55% 45% 50% 50%;animation-delay:200ms}
@keyframes g15-sweep{0%,100%{transform:translate(0,0);opacity:.5}50%{transform:translate(14%,-14%);opacity:.85}}
@keyframes g15-fill{0%{opacity:0;transform:translateY(40%) scale(0.4)}25%{opacity:1}55%{opacity:.95;transform:translateY(0%) scale(1.05)}100%{opacity:0;transform:translateY(-8%) scale(1.15)}}
@keyframes g15-squash{0%{transform:translateZ(0) scale(1)}20%{transform:translateZ(0) scale(1.04,0.92)}48%{transform:translateZ(0) scale(0.96,1.06)}74%{transform:translateZ(0) scale(1.02,0.99)}100%{transform:translateZ(0) scale(1)}}

<script>
  function fire(g){ g.classList.remove('play'); void g.offsetWidth; g.classList.add('play');
    clearTimeout(g._t); g._t=setTimeout(()=>g.classList.remove('play'),1250); }
  document.querySelectorAll('.grape').forEach(g=>g.addEventListener('click',()=>fire(g)));
  document.getElementById('playAll').addEventListener('click',()=>{
    document.querySelectorAll('.card:not([hidden]) .grape').forEach((g,i)=>setTimeout(()=>fire(g),i*85)); });
  let picksOnly=false;
  document.getElementById('onlyPicks').addEventListener('click',function(){
    picksOnly=!picksOnly; this.textContent=picksOnly?'전체 보기':'추천만 보기';
    document.querySelectorAll('.card').forEach(c=>{ c.hidden = picksOnly && !c.querySelector('.pick'); }); });
  // 오프스크린 카드는 idle 일시정지(모바일 성능)
  const io=new IntersectionObserver(es=>es.forEach(e=>e.target.classList.toggle('paused',!e.isIntersecting)),{rootMargin:'120px'});
  document.querySelectorAll('.card').forEach(c=>io.observe(c));
</script>
